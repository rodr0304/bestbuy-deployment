name: Build and Push Product Service

on:
  push:
    paths:
      - 'product-service/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: |
          cd product-service
          docker build -t rodr0304/product-service:latest .

      - name: Push image
        run: docker push rodr0304/product-service:latest
