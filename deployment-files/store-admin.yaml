apiVersion: apps/v1
kind: Deployment
metadata:
  name: store-admin
  namespace: bestbuy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: store-admin
  template:
    metadata:
      labels:
        app: store-admin
    spec:
      containers:
        - name: store-admin
          image: rodr0304/store-admin:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: PRODUCT_SERVICE_URL
              value: "http://product-service:3000"
            - name: ORDER_SERVICE_URL
              value: "http://order-service:3000"
            - name: MAKELINE_SERVICE_URL
              value: "http://makeline-service:3000"
---
apiVersion: v1
kind: Service
metadata:
  name: store-admin
  namespace: bestbuy
spec:
  type: LoadBalancer
  selector:
    app: store-admin
  ports:
    - port: 80
      targetPort: 3000