apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: bestbuy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: rodr0304/product-service:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: MONGO_URL
              value: "mongodb://mongodb:27017"
            - name: DB_NAME
              value: "bestbuy"
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: bestbuy
spec:
  selector:
    app: product-service
  ports:
    - port: 3000
      targetPort: 3000