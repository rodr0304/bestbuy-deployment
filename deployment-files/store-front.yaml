apiVersion: apps/v1
kind: Deployment
metadata:
  name: store-front
  namespace: bestbuy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: store-front
  template:
    metadata:
      labels:
        app: store-front
    spec:
      containers:
      - name: store-front
        image: yourdockerhub/store-front
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: store-front
  namespace: bestbuy
spec:
  type: LoadBalancer
  selector:
    app: store-front
  ports:
  - port: 80
    targetPort: 80
